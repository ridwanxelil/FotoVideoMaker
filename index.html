<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoMotion — Fotoğraf Animasyon Stüdyosu</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23ff6b35' width='100' height='100'/%3E%3Ccircle cx='50' cy='40' r='20' fill='%23fff'/%3E%3Cpath d='M30 70 Q50 50 70 70' fill='none' stroke='%23fff' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #ff6b35;
      --accent2: #7c3aed;
      --accent3: #06d6a0;
      --text: #e8e8f0;
      --text-muted: #6b6b8a;
      --sidebar-w: 270px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Syne', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      height: 100vh; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
    }

    /* HEADER */
    header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 10px 20px; 
      background: var(--surface); 
      border-bottom: 1px solid var(--border); 
      z-index: 10; 
      flex-shrink: 0; 
    }
    .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn { 
      padding: 7px 16px; 
      border-radius: 8px; 
      border: none; 
      cursor: pointer; 
      font-family: 'Syne', sans-serif; 
      font-weight: 600; 
      font-size: 12px; 
      transition: all 0.2s; 
    }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #ff8555; transform: translateY(-1px); }
    .btn-secondary { background: var(--accent2); color: #fff; }
    .btn-secondary:hover { background: #9d5df5; transform: translateY(-1px); }

    /* LAYOUT */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* SIDEBARS */
    .sidebar { 
      width: var(--sidebar-w); 
      background: var(--surface); 
      display: flex; 
      flex-direction: column; 
      overflow-y: auto; 
      overflow-x: hidden; 
      flex-shrink: 0; 
    }
    .sidebar.left { border-right: 1px solid var(--border); }
    .sidebar.right { border-left: 1px solid var(--border); }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ACCORDION */
    .acc-section { border-bottom: 1px solid var(--border); }
    .acc-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 13px 16px; 
      cursor: pointer; 
      user-select: none; 
      transition: background 0.15s; 
    }
    .acc-header:hover { background: var(--surface2); }
    .acc-title { 
      font-size: 10px; 
      font-weight: 700; 
      letter-spacing: 1.8px; 
      text-transform: uppercase; 
      color: var(--text-muted); 
      font-family: 'JetBrains Mono', monospace; 
    }
    .acc-arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
    .acc-section.open .acc-arrow { transform: rotate(180deg); }
    .acc-body { display: none; padding: 4px 16px 14px; }
    .acc-section.open .acc-body { display: block; }

    /* CONTROLS */
    .control-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 11px; }
    .control-row:last-child { margin-bottom: 0; }
    .control-label { 
      font-size: 11px; 
      color: var(--text-muted); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .control-label .val { 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 10px; 
      color: var(--accent3); 
    }

    input[type=range] { 
      -webkit-appearance: none; 
      width: 100%; 
      height: 3px; 
      background: var(--border); 
      border-radius: 2px; 
      outline: none; 
    }
    input[type=range]::-webkit-slider-thumb { 
      -webkit-appearance: none; 
      width: 13px; 
      height: 13px; 
      border-radius: 50%; 
      background: var(--accent); 
      cursor: pointer; 
      transition: transform 0.15s; 
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    select, input[type=number], input[type=text] { 
      width: 100%; 
      background: var(--bg); 
      border: 1px solid var(--border); 
      color: var(--text); 
      padding: 6px 9px; 
      border-radius: 7px; 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 11px; 
      outline: none; 
      transition: border-color 0.2s; 
    }
    select:focus, input[type=number]:focus, input[type=text]:focus { border-color: var(--accent); }

    .format-toggle { 
      display: flex; 
      border-radius: 8px; 
      overflow: hidden; 
      border: 1px solid var(--border); 
    }
    .format-toggle button { 
      flex: 1; 
      padding: 7px; 
      background: transparent; 
      border: none; 
      color: var(--text-muted); 
      font-family: 'Syne', sans-serif; 
      font-weight: 700; 
      font-size: 11px; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    .format-toggle button.active { background: var(--accent); color: #fff; }

    .effect-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .effect-card { 
      background: var(--bg); 
      border: 1px solid var(--border); 
      border-radius: 7px; 
      padding: 8px 5px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.2s; 
      font-size: 9px; 
      color: var(--text-muted); 
    }
    .effect-card:hover { border-color: var(--accent); color: var(--text); }
    .effect-card.active { border-color: var(--accent); background: rgba(255,107,53,0.1); color: var(--accent); }
    .effect-card .icon { font-size: 15px; margin-bottom: 2px; display: block; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    input[type=color] { 
      width: 100%; 
      height: 32px; 
      border: 1px solid var(--border); 
      border-radius: 7px; 
      background: var(--bg); 
      cursor: pointer; 
      padding: 2px; 
    }

    /* CENTER PANEL */
    .center-panel { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      background: var(--bg); 
      min-width: 0; 
    }

    .preview-wrap { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-start; 
      padding: 14px 14px 0; 
      position: relative; 
      background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg) 70%); 
      min-height: 0; 
      overflow: hidden; 
    }
    .preview-canvas-wrap { 
      position: relative; 
      border-radius: 10px; 
      overflow: hidden; 
      box-shadow: 0 0 0 1px var(--border), 0 16px 50px rgba(0,0,0,0.6); 
      cursor: grab; 
      user-select: none; 
      background: #111; 
      flex-shrink: 0; 
    }
    .preview-canvas-wrap:active { cursor: grabbing; }
    #previewCanvas { display: block; }

    .preview-empty { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      width: 100%; 
      height: 200px; 
      border: 2px dashed var(--border); 
      border-radius: 12px; 
      color: var(--text-muted); 
      gap: 8px; 
    }
    .preview-empty .big-icon { font-size: 40px; opacity: 0.4; }

    .zoom-controls { 
      position: absolute; 
      bottom: 8px; 
      right: 16px; 
      display: flex; 
      gap: 5px; 
      align-items: center; 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 9px; 
      padding: 4px 9px; 
    }
    .zoom-btn { 
      width: 24px; 
      height: 24px; 
      border-radius: 5px; 
      background: var(--bg); 
      border: 1px solid var(--border); 
      color: var(--text); 
      cursor: pointer; 
      font-size: 13px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.15s; 
    }
    .zoom-btn:hover { background: var(--accent); border-color: var(--accent); }
    .zoom-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); min-width: 36px; text-align: center; }
    .aspect-badge { 
      position: absolute; 
      top: 8px; 
      left: 16px; 
      background: rgba(0,0,0,0.6); 
      border: 1px solid var(--border); 
      border-radius: 6px; 
      padding: 2px 7px; 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 9px; 
      color: var(--accent3); 
      pointer-events: none; 
    }

    /* PLAYBACK */
    .playback-bar { 
      flex-shrink: 0; 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      padding: 8px 16px; 
      background: var(--surface); 
      border-top: 1px solid var(--border); 
      border-bottom: 1px solid var(--border); 
    }
    .play-btn { 
      width: 32px; 
      height: 32px; 
      border-radius: 50%; 
      background: var(--accent); 
      border: none; 
      color: #fff; 
      font-size: 13px; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.2s; 
      flex-shrink: 0; 
    }
    .play-btn:hover { background: #ff8555; transform: scale(1.1); }
    .timeline-wrap { flex: 1; position: relative; height: 5px; background: var(--border); border-radius: 3px; cursor: pointer; }
    .timeline-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.1s linear; }
    .frame-info { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

    /* PHOTO STRIP */
    .photo-strip-wrap { 
      flex-shrink: 0; 
      display: flex; 
      flex-direction: column; 
      background: var(--surface); 
      border-top: 1px solid var(--border); 
    }
    .strip-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 7px 16px 4px; 
      flex-shrink: 0; 
    }
    .strip-title { 
      font-size: 9px; 
      font-weight: 700; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
      color: var(--text-muted); 
      font-family: 'JetBrains Mono', monospace; 
    }
    .photo-strip { 
      display: flex; 
      gap: 8px; 
      padding: 4px 16px 10px; 
      overflow-x: auto; 
      overflow-y: hidden; 
      align-items: flex-end; 
    }
    .photo-strip::-webkit-scrollbar { height: 3px; }
    .photo-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .drop-zone { 
      min-width: 72px; 
      height: 68px; 
      border: 2px dashed var(--border); 
      border-radius: 9px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer; 
      color: var(--text-muted); 
      font-size: 10px; 
      gap: 3px; 
      flex-shrink: 0; 
      transition: all 0.2s; 
    }
    .drop-zone:hover, .drop-zone.dragover { 
      border-color: var(--accent); 
      color: var(--accent); 
      background: rgba(255,107,53,0.04); 
    }
    .drop-zone .plus { font-size: 20px; }

    .photo-thumb { 
      position: relative; 
      width: 68px; 
      height: 68px; 
      flex-shrink: 0; 
      border-radius: 9px; 
      overflow: hidden; 
      cursor: pointer; 
      border: 2px solid transparent; 
      transition: all 0.2s; 
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .photo-thumb:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .photo-thumb.active { border-color: var(--accent); }
    .photo-thumb .close-btn { 
      position: absolute; 
      top: 2px; 
      right: 2px; 
      width: 20px; 
      height: 20px; 
      background: rgba(0,0,0,0.7); 
      border: none; 
      border-radius: 4px; 
      color: #fff; 
      cursor: pointer; 
      font-size: 12px; 
      display: none; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.15s; 
    }
    .photo-thumb:hover .close-btn { display: flex; }
    .photo-thumb .close-btn:hover { background: rgba(255,107,53,0.9); }

    .motion-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 9px; }
    .motion-btn { 
      padding: 7px 4px; 
      background: var(--bg); 
      border: 1px solid var(--border); 
      border-radius: 7px; 
      color: var(--text-muted); 
      font-size: 9px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.2s; 
      font-family: 'Syne', sans-serif; 
      font-weight: 600; 
    }
    .motion-btn:hover { border-color: var(--accent2); color: var(--text); }
    .motion-btn.active { border-color: var(--accent2); background: rgba(124,58,237,0.12); color: var(--accent2); }
    .motion-btn .mi { display: block; font-size: 14px; margin-bottom: 2px; }

    .badge { 
      display: inline-block; 
      padding: 2px 7px; 
      border-radius: 4px; 
      font-size: 10px; 
      font-weight: 700; 
      letter-spacing: 0.5px; 
      font-family: 'JetBrains Mono', monospace; 
    }
    .badge-green { background: rgba(6,214,160,0.15); color: var(--accent3); }

    /* MODAL */
    #renderOverlay { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.8); 
      z-index: 100; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
    }
    #renderOverlay.show { display: flex; }
    .render-modal { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      padding: 32px; 
      text-align: center; 
      max-width: 400px; 
    }
    .render-icon { font-size: 48px; margin-bottom: 16px; animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .render-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .render-status { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .progress-bar { 
      width: 100%; 
      height: 6px; 
      background: var(--border); 
      border-radius: 3px; 
      overflow: hidden; 
      margin-bottom: 8px; 
    }
    .progress-fill { 
      height: 100%; 
      background: var(--accent); 
      width: 0%; 
      transition: width 0.3s; 
    }
    .progress-percent { font-size: 11px; color: var(--accent3); font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Photo<span>Motion</span></div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="exportGifBtn">Render GIF</button>
      <button class="btn btn-primary" id="exportMp4Btn">Render Video</button>
    </div>
  </header>

  <div class="app-body">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar left" id="leftSidebar">
      <div class="acc-section open">
        <div class="acc-header">
          <span class="acc-title">⚙️ Ayarlar</span>
          <span class="acc-arrow">▼</span>
        </div>
        <div class="acc-body">
          <div class="control-row">
            <label class="control-label">Genişlik <span class="val" id="widthVal">1920</span>px</label>
            <input type="range" id="widthSlider" min="640" max="4096" value="1920" step="16">
          </div>
          <div class="control-row">
            <label class="control-label">Yükseklik <span class="val" id="heightVal">1080</span>px</label>
            <input type="range" id="heightSlider" min="360" max="4096" value="1080" step="16">
          </div>
          <div class="control-row">
            <select id="aspectRatio">
              <option value="custom">Özel Oran</option>
              <option value="1920x1080">1920x1080 (16:9)</option>
              <option value="1080x1920">1080x1920 (9:16)</option>
              <option value="1080x1080">1080x1080 (1:1)</option>
              <option value="1280x960">1280x960 (4:3)</option>
              <option value="1920x1280">1920x1280 (3:2)</option>
              <option value="2560x1080">2560x1080 (21:9)</option>
            </select>
          </div>
          <div class="control-row">
            <label class="control-label">FPS <span class="val" id="fpsVal">30</span></label>
            <input type="range" id="fpsSlider" min="10" max="60" value="30">
          </div>
          <div class="control-row">
            <label class="control-label">Bitrate <span class="val" id="bitrateVal">25</span>Mbps</label>
            <input type="range" id="bitrateSlider" min="1" max="50" value="25">
          </div>
        </div>
      </div>

      <div class="acc-section open">
        <div class="acc-header">
          <span class="acc-title">🎬 Animasyon</span>
          <span class="acc-arrow">▼</span>
        </div>
        <div class="acc-body">
          <div class="control-row">
            <label class="control-label">Kare Süresi <span class="val" id="frameDurVal">5000</span>ms</label>
            <input type="range" id="frameDurSlider" min="500" max="10000" value="5000" step="100">
          </div>
        </div>
      </div>

      <div class="acc-section">
        <div class="acc-header">
          <span class="acc-title">🎨 Metin</span>
          <span class="acc-arrow">▼</span>
        </div>
        <div class="acc-body">
          <div class="control-row">
            <label class="control-label">Metin</label>
            <input type="text" id="textInput" placeholder="Metin girin...">
          </div>
          <div class="control-row">
            <label class="control-label">Boyut <span class="val" id="textSizeVal">48</span>px</label>
            <input type="range" id="textSizeSlider" min="12" max="200" value="48">
          </div>
          <div class="control-row">
            <label class="control-label">Renk</label>
            <input type="color" id="textColorInput" value="#ffffff">
          </div>
          <div class="control-row">
            <label class="control-label">Arka Plan Rengi</label>
            <input type="color" id="bgColorInput" value="#000000">
          </div>
        </div>
      </div>

      <div class="acc-section open">
        <div class="acc-header">
          <span class="acc-title">📍 Konum Ayarları</span>
          <span class="acc-arrow">▼</span>
        </div>
        <div class="acc-body">
          <div class="control-row" style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
            <label class="control-label" style="color: var(--accent);">
              Seçili Fotoğraf: <span id="selectedPhotoLabel" style="font-weight: 700;">Hiçbiri</span>
            </label>
          </div>
          <div class="control-row">
            <label class="control-label">Yatay Kaydır <span class="val" id="panXVal">0</span>%</label>
            <input type="range" id="panXSlider" min="-100" max="100" value="0" step="5">
          </div>
          <div class="control-row">
            <label class="control-label">Dikey Kaydır <span class="val" id="panYVal">0</span>%</label>
            <input type="range" id="panYSlider" min="-100" max="100" value="0" step="5">
          </div>
          <div class="control-row">
            <label class="control-label">Yakınlaştırma <span class="val" id="zoomScaleVal">100</span>%</label>
            <input type="range" id="zoomScaleSlider" min="50" max="300" value="100" step="5">
          </div>
        </div>
      </div>
    </div>

    <!-- CENTER PANEL -->
    <div class="center-panel">
      <div class="preview-wrap">
        <div class="aspect-badge" id="aspectBadge">16:9</div>
        <div class="preview-canvas-wrap" id="previewCanvasWrap">
          <canvas id="previewCanvas"></canvas>
          <div class="zoom-controls">
            <button class="zoom-btn" id="zoomOutBtn">−</button>
            <span class="zoom-val" id="zoomVal">100%</span>
            <button class="zoom-btn" id="zoomInBtn">+</button>
            <button class="zoom-btn" id="zoomFitBtn">✓</button>
          </div>
        </div>
      </div>

      <div class="playback-bar">
        <button class="play-btn" id="playBtn">▶</button>
        <div class="timeline-wrap" id="timelineWrap">
          <div class="timeline-fill" id="timelineFill"></div>
        </div>
        <span class="frame-info" id="frameInfo">0:00 / 0:00</span>
      </div>

      <div class="photo-strip-wrap">
        <div class="strip-header">
          <span class="strip-title">Fotoğraflar</span>
        </div>
        <div class="photo-strip" id="photoStrip">
          <div class="drop-zone" id="dropZone">
            <div class="plus">+</div>
            <div>Fotoğraf Ekle</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RENDER OVERLAY -->
  <div id="renderOverlay">
    <div class="render-modal">
      <div class="render-icon">🎬</div>
      <div class="render-title">Render Ediliyor...</div>
      <div class="render-status" id="renderStatus">Başlanıyor...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-percent" id="progressPercent">0%</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

  <script>
    const photos = [];
    let playbackState = false;
    let currentFrame = 0;
    let totalFrames = 0;
    let startTime = 0;
    let selectedPhotoIndex = -1;

    const settings = {
      width: 1920,
      height: 1080,
      fps: 30,
      bitrate: 25,
      frameDur: 5000,
      text: '',
      textSize: 48,
      textColor: '#ffffff',
      bgColor: '#000000',
      panX: 0,
      panY: 0,
      zoomScale: 1
    };

    // UI Elements
    const widthSlider = document.getElementById('widthSlider');
    const heightSlider = document.getElementById('heightSlider');
    const fpsSlider = document.getElementById('fpsSlider');
    const bitrateSlider = document.getElementById('bitrateSlider');
    const frameDurSlider = document.getElementById('frameDurSlider');
    const textInput = document.getElementById('textInput');
    const textSizeSlider = document.getElementById('textSizeSlider');
    const textColorInput = document.getElementById('textColorInput');
    const bgColorInput = document.getElementById('bgColorInput');
    const aspectRatioSelect = document.getElementById('aspectRatio');
    const panXSlider = document.getElementById('panXSlider');
    const panYSlider = document.getElementById('panYSlider');
    const zoomScaleSlider = document.getElementById('zoomScaleSlider');
    const dropZone = document.getElementById('dropZone');
    const photoStrip = document.getElementById('photoStrip');
    const previewCanvas = document.getElementById('previewCanvas');
    const playBtn = document.getElementById('playBtn');
    const timelineWrap = document.getElementById('timelineWrap');
    const timelineFill = document.getElementById('timelineFill');
    const frameInfo = document.getElementById('frameInfo');
    const exportGifBtn = document.getElementById('exportGifBtn');
    const exportMp4Btn = document.getElementById('exportMp4Btn');
    const renderOverlay = document.getElementById('renderOverlay');
    const progressFill = document.getElementById('progressFill');
    const renderStatus = document.getElementById('renderStatus');
    const progressPercent = document.getElementById('progressPercent');

    // Utility Functions
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function updateValueDisplay(element, value) {
      const valElement = element.parentElement.querySelector('.val');
      if (valElement) valElement.textContent = value;
    }

    function setProgress(percent, status) {
      progressFill.style.width = percent + '%';
      progressPercent.textContent = Math.round(percent) + '%';
      if (status) renderStatus.textContent = status;
    }

    function lockSettings(locked) {
      document.querySelectorAll('#leftSidebar input, #leftSidebar select').forEach(el => {
        el.disabled = locked;
      });
    }

    // Slider Events
    widthSlider.addEventListener('input', (e) => {
      settings.width = parseInt(e.target.value);
      updateValueDisplay(widthSlider, settings.width);
      resizePreview();
    });

    heightSlider.addEventListener('input', (e) => {
      settings.height = parseInt(e.target.value);
      updateValueDisplay(heightSlider, settings.height);
      resizePreview();
    });

    fpsSlider.addEventListener('input', (e) => {
      settings.fps = parseInt(e.target.value);
      updateValueDisplay(fpsSlider, settings.fps);
    });

    bitrateSlider.addEventListener('input', (e) => {
      settings.bitrate = parseInt(e.target.value);
      updateValueDisplay(bitrateSlider, settings.bitrate);
    });

    frameDurSlider.addEventListener('input', (e) => {
      settings.frameDur = parseInt(e.target.value);
      updateValueDisplay(frameDurSlider, settings.frameDur);
      updateTotalFrames();
    });

    textInput.addEventListener('input', (e) => {
      settings.text = e.target.value;
      resizePreview();
    });

    textSizeSlider.addEventListener('input', (e) => {
      settings.textSize = parseInt(e.target.value);
      updateValueDisplay(textSizeSlider, settings.textSize);
      resizePreview();
    });

    textColorInput.addEventListener('change', (e) => {
      settings.textColor = e.target.value;
      resizePreview();
    });

    bgColorInput.addEventListener('change', (e) => {
      settings.bgColor = e.target.value;
      resizePreview();
    });

    panXSlider.addEventListener('input', (e) => {
      const value = parseInt(e.target.value);
      
      if (selectedPhotoIndex >= 0) {
        photos[selectedPhotoIndex].panX = value;
      } else {
        settings.panX = value;
      }
      
      updateValueDisplay(panXSlider, value);
      resizePreview();
    });

    panYSlider.addEventListener('input', (e) => {
      const value = parseInt(e.target.value);
      
      if (selectedPhotoIndex >= 0) {
        photos[selectedPhotoIndex].panY = value;
      } else {
        settings.panY = value;
      }
      
      updateValueDisplay(panYSlider, value);
      resizePreview();
    });

    zoomScaleSlider.addEventListener('input', (e) => {
      const value = parseInt(e.target.value) / 100;
      
      if (selectedPhotoIndex >= 0) {
        photos[selectedPhotoIndex].zoomScale = value;
      } else {
        settings.zoomScale = value;
      }
      
      updateValueDisplay(zoomScaleSlider, parseInt(e.target.value));
      resizePreview();
    });

    aspectRatioSelect.addEventListener('change', (e) => {
      const value = e.target.value;
      if (value !== 'custom') {
        const [w, h] = value.split('x').map(Number);
        settings.width = w;
        settings.height = h;
        widthSlider.value = settings.width;
        heightSlider.value = settings.height;
        updateValueDisplay(widthSlider, settings.width);
        updateValueDisplay(heightSlider, settings.height);
        resizePreview();
      }
    });

    // Photo Management
    dropZone.addEventListener('click', () => document.createElement('input').setAttribute('type', 'file'), false);
    
    const fileInput = (() => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.addEventListener('change', (e) => {
        [...e.target.files].forEach(file => {
          const reader = new FileReader();
          reader.onload = (evt) => {
            const img = new Image();
            img.onload = () => {
              photos.push({ 
                img, 
                panX: 0, 
                panY: 0, 
                zoomScale: 1 
              });
              addPhotoThumb();
              updateTotalFrames();
              resizePreview();
            };
            img.src = evt.target.result;
          };
          reader.readAsDataURL(file);
        });
      });
      return input;
    })();

    dropZone.addEventListener('click', () => fileInput.click());

    function addPhotoThumb() {
      const photoIdx = photos.length - 1;
      const photo = photos[photoIdx];
      
      // Initialize photo with individual position settings
      if (!photo.panX) photo.panX = 0;
      if (!photo.panY) photo.panY = 0;
      if (!photo.zoomScale) photo.zoomScale = 1;
      
      const thumb = document.createElement('div');
      thumb.className = 'photo-thumb';
      thumb.innerHTML = `<img src="${photo.img.src}">
        <button class="close-btn">×</button>`;
      
      thumb.addEventListener('click', () => {
        // Deselect previous
        document.querySelectorAll('.photo-thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
        selectedPhotoIndex = photoIdx;
        
        // Update selected photo label
        document.getElementById('selectedPhotoLabel').textContent = `Fotoğraf ${photoIdx + 1}`;
        
        // Update sidebar controls with this photo's position
        panXSlider.value = photo.panX;
        panYSlider.value = photo.panY;
        zoomScaleSlider.value = Math.round(photo.zoomScale * 100);
        
        updateValueDisplay(panXSlider, photo.panX);
        updateValueDisplay(panYSlider, photo.panY);
        updateValueDisplay(zoomScaleSlider, Math.round(photo.zoomScale * 100));
        
        resizePreview();
      });
      
      thumb.querySelector('.close-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = [...photoStrip.querySelectorAll('.photo-thumb')].indexOf(thumb);
        photos.splice(idx, 1);
        if (selectedPhotoIndex === idx) {
          selectedPhotoIndex = -1;
          document.getElementById('selectedPhotoLabel').textContent = 'Hiçbiri';
        }
        thumb.remove();
        updateTotalFrames();
        resizePreview();
      });

      photoStrip.insertBefore(thumb, dropZone);
    }

    function updateTotalFrames() {
      totalFrames = 0;
      for (let i = 0; i < photos.length; i++) {
        totalFrames += Math.max(1, Math.round((settings.frameDur / 1000) * settings.fps));
      }
    }

    function resizePreview() {
      const ctx = previewCanvas.getContext('2d');
      const wrap = document.getElementById('previewCanvasWrap');
      
      const maxWidth = wrap.parentElement.offsetWidth - 28;
      const maxHeight = wrap.parentElement.offsetHeight - 28;
      let scale = Math.min(maxWidth / settings.width, maxHeight / settings.height);
      scale = Math.min(1, Math.max(0.1, scale));

      previewCanvas.width = settings.width;
      previewCanvas.height = settings.height;
      wrap.style.width = (settings.width * scale) + 'px';
      wrap.style.height = (settings.height * scale) + 'px';

      ctx.fillStyle = settings.bgColor;
      ctx.fillRect(0, 0, settings.width, settings.height);

      if (photos.length > 0) {
        const photoIdx = selectedPhotoIndex >= 0 ? selectedPhotoIndex : 0;
        drawImageFit(ctx, photos[photoIdx].img, 0, 0, settings.width, settings.height, photoIdx);
      }

      if (settings.text) {
        drawText(ctx, settings.text, settings.width, settings.height);
      }

      updateAspectBadge();
    }

    function drawImageFit(ctx, img, x, y, w, h, photoIdx) {
      const iw = img.width, ih = img.height;
      
      // Get individual photo settings or use global
      let panX = 0, panY = 0, zoomScale = 1;
      if (photoIdx !== undefined && photos[photoIdx]) {
        panX = photos[photoIdx].panX || 0;
        panY = photos[photoIdx].panY || 0;
        zoomScale = photos[photoIdx].zoomScale || 1;
      } else {
        panX = settings.panX;
        panY = settings.panY;
        zoomScale = settings.zoomScale;
      }

      // Use cover-like contain: fill the area while maintaining aspect ratio
      // Then allow pan/zoom for user positioning
      const scale = Math.max(w / iw, h / ih); // Use MAX for full coverage
      const scaledW = iw * scale;
      const scaledH = ih * scale;
      
      // Center the image
      let dx = x + (w - scaledW) / 2;
      let dy = y + (h - scaledH) / 2;

      // Apply pan
      const panOffsetX = (w * panX) / 100;
      const panOffsetY = (h * panY) / 100;

      // Apply zoom
      const zoomedW = scaledW * zoomScale;
      const zoomedH = scaledH * zoomScale;
      
      dx = x + (w - zoomedW) / 2 + panOffsetX;
      dy = y + (h - zoomedH) / 2 + panOffsetY;

      ctx.drawImage(img, dx, dy, zoomedW, zoomedH);
    }

    function drawText(ctx, text, w, h) {
      ctx.font = `bold ${settings.textSize}px 'Syne'`;
      ctx.fillStyle = settings.textColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, w / 2, h - settings.textSize - 20);
    }

    function buildFrameCanvas(photoIdx) {
      const c = document.createElement('canvas');
      c.width = settings.width; c.height = settings.height;
      const ctx = c.getContext('2d');
      ctx.fillStyle = settings.bgColor;
      ctx.fillRect(0, 0, settings.width, settings.height);
      drawImageFit(ctx, photos[photoIdx].img, 0, 0, settings.width, settings.height, photoIdx);
      drawText(ctx, settings.text, settings.width, settings.height);
      return c;
    }

    // Preview Mouse & Wheel Controls
    let isMouseDown = false;
    let mouseStartX = 0;
    let mouseStartY = 0;
    let startPanX = 0;
    let startPanY = 0;

    const previewCanvasWrap = document.getElementById('previewCanvasWrap');

    previewCanvasWrap.addEventListener('mousedown', (e) => {
      isMouseDown = true;
      mouseStartX = e.clientX;
      mouseStartY = e.clientY;
      
      if (selectedPhotoIndex >= 0) {
        startPanX = photos[selectedPhotoIndex].panX || 0;
        startPanY = photos[selectedPhotoIndex].panY || 0;
      } else {
        startPanX = settings.panX;
        startPanY = settings.panY;
      }
      
      previewCanvasWrap.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isMouseDown) return;
      
      const deltaX = e.clientX - mouseStartX;
      const deltaY = e.clientY - mouseStartY;
      
      const moveX = (deltaX / settings.width) * 100;
      const moveY = (deltaY / settings.height) * 100;
      
      let newPanX = Math.max(-100, Math.min(100, startPanX + moveX));
      let newPanY = Math.max(-100, Math.min(100, startPanY + moveY));
      
      if (selectedPhotoIndex >= 0) {
        photos[selectedPhotoIndex].panX = newPanX;
        photos[selectedPhotoIndex].panY = newPanY;
      } else {
        settings.panX = newPanX;
        settings.panY = newPanY;
      }
      
      panXSlider.value = newPanX;
      panYSlider.value = newPanY;
      
      updateValueDisplay(panXSlider, newPanX);
      updateValueDisplay(panYSlider, newPanY);
      
      resizePreview();
    });

    document.addEventListener('mouseup', () => {
      isMouseDown = false;
      previewCanvasWrap.style.cursor = 'grab';
    });

    previewCanvasWrap.addEventListener('wheel', (e) => {
      e.preventDefault();
      
      const delta = e.deltaY > 0 ? -5 : 5;
      let newZoomScale;
      
      if (selectedPhotoIndex >= 0) {
        newZoomScale = Math.max(0.5, Math.min(3, photos[selectedPhotoIndex].zoomScale + (delta / 100)));
        photos[selectedPhotoIndex].zoomScale = newZoomScale;
      } else {
        newZoomScale = Math.max(0.5, Math.min(3, settings.zoomScale + (delta / 100)));
        settings.zoomScale = newZoomScale;
      }
      
      const zoomPercent = Math.round(newZoomScale * 100);
      zoomScaleSlider.value = zoomPercent;
      
      updateValueDisplay(zoomScaleSlider, zoomPercent);
      resizePreview();
    }, { passive: false });

    // Playback
    playBtn.addEventListener('click', () => {
      playbackState = !playbackState;
      playBtn.textContent = playbackState ? '⏸' : '▶';
      if (playbackState) {
        startTime = performance.now() - (currentFrame * (1000 / settings.fps));
        animate();
      }
    });

    function animate() {
      if (!playbackState) return;
      const elapsed = performance.now() - startTime;
      currentFrame = Math.floor(elapsed / (1000 / settings.fps));
      
      if (currentFrame >= totalFrames) {
        playbackState = false;
        playBtn.textContent = '▶';
        currentFrame = 0;
        return;
      }

      updatePreviewFrame();
      updateTimeline();
      requestAnimationFrame(animate);
    }

    function updatePreviewFrame() {
      const ctx = previewCanvas.getContext('2d');
      const holdF = Math.max(1, Math.round((settings.frameDur / 1000) * settings.fps));
      
      let accum = 0;
      for (let i = 0; i < photos.length; i++) {
        if (currentFrame < accum + holdF) {
          ctx.fillStyle = settings.bgColor;
          ctx.fillRect(0, 0, settings.width, settings.height);
          drawImageFit(ctx, photos[i].img, 0, 0, settings.width, settings.height, i);
          drawText(ctx, settings.text, settings.width, settings.height);
          return;
        }
        accum += holdF;
      }
    }

    function updateTimeline() {
      const pct = (currentFrame / totalFrames) * 100;
      timelineFill.style.width = pct + '%';
      
      const secs = (currentFrame * 1000) / (settings.fps * 1000);
      const total = (totalFrames * 1000) / (settings.fps * 1000);
      
      frameInfo.textContent = formatTime(secs) + ' / ' + formatTime(total);
    }

    function formatTime(ms) {
      const min = Math.floor(ms / 60);
      const sec = Math.floor(ms % 60);
      return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    timelineWrap.addEventListener('click', (e) => {
      const rect = timelineWrap.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      currentFrame = Math.floor(pct * totalFrames);
      updatePreviewFrame();
      updateTimeline();
    });

    // Zoom
    let zoom = 1;
    document.getElementById('zoomInBtn').addEventListener('click', () => {
      zoom = Math.min(3, zoom * 1.2);
      updateZoom();
    });
    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      zoom = Math.max(0.1, zoom / 1.2);
      updateZoom();
    });
    document.getElementById('zoomFitBtn').addEventListener('click', () => {
      zoom = 1;
      updateZoom();
    });

    function updateZoom() {
      const wrap = document.getElementById('previewCanvasWrap');
      wrap.style.transform = `scale(${zoom})`;
      document.getElementById('zoomVal').textContent = Math.round(zoom * 100) + '%';
    }

    function updateAspectBadge() {
      const r = settings.width / settings.height;
      const badge = document.getElementById('aspectBadge');
      if (Math.abs(r - 16/9) < 0.01) badge.textContent = '16:9';
      else if (Math.abs(r - 9/16) < 0.01) badge.textContent = '9:16';
      else if (Math.abs(r - 1) < 0.01) badge.textContent = '1:1';
      else badge.textContent = `${settings.width}×${settings.height}`;
    }

    // Export Functions
    async function exportGIF() {
      if (photos.length === 0) {
        alert('Lütfen fotoğraf ekleyin!');
        return;
      }

      lockSettings(true);
      renderOverlay.classList.add('show');
      const fps = Math.min(settings.fps, 25);
      const holdCount = Math.max(1, Math.round((settings.frameDur / 1000) * fps));
      const frameDelay = Math.round(1000 / fps);
      const allFrames = [];

      for (let i = 0; i < photos.length; i++) {
        setProgress((i / photos.length) * 60, `Kare ${i + 1}/${photos.length} hazırlanıyor...`);
        await sleep(1);
        for (let f = 0; f < holdCount; f++) {
          allFrames.push({ canvas: buildFrameCanvas(i), delay: frameDelay });
        }
      }

      setProgress(65, 'GIF oluşturuluyor...');
      await sleep(5);

      let workerUrl;
      try {
        const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
        const text = await resp.text();
        const blob = new Blob([text], { type: 'application/javascript' });
        workerUrl = URL.createObjectURL(blob);
      } catch (e) {
        workerUrl = 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js';
      }

      const gif = new GIF({
        workers: 4,
        quality: 10,
        width: settings.width,
        height: settings.height,
        workerScript: workerUrl
      });

      for (let i = 0; i < allFrames.length; i++) {
        if (i % 10 === 0) {
          setProgress(65 + (i / allFrames.length) * 25, `GIF: ${i + 1}/${allFrames.length}`);
          await sleep(0);
        }
        gif.addFrame(allFrames[i].canvas, { delay: allFrames[i].delay, copy: false });
      }

      setProgress(92, 'Kaydediliyor...');
      gif.on('progress', p => setProgress(92 + p * 6, 'Kaydediliyor...'));
      gif.on('finished', blob => {
        if (workerUrl.startsWith('blob:')) URL.revokeObjectURL(workerUrl);
        setProgress(100, 'Tamamlandı!');
        
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'animation.gif';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 15000);

        setTimeout(() => {
          renderOverlay.classList.remove('show');
          lockSettings(false);
        }, 1500);
      });

      gif.render();
    }

    async function exportMP4() {
      if (photos.length === 0) {
        alert('Lütfen fotoğraf ekleyin!');
        return;
      }

      try {
        lockSettings(true);
        renderOverlay.classList.add('show');

        const off = document.createElement('canvas');
        off.width = settings.width;
        off.height = settings.height;
        const ctx = off.getContext('2d');
        const mimes = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
        const mimeType = mimes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
        const chunks = [];
        const stream = off.captureStream(settings.fps);
        const rec = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: settings.bitrate * 1_000_000 });

        rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        rec.onstop = () => {
          setProgress(95, 'Video oluşturuluyor...');
          const blob = new Blob(chunks, { type: mimeType });
          const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `animation.${ext}`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 15000);

          setTimeout(() => {
            renderOverlay.classList.remove('show');
            lockSettings(false);
          }, 1500);
        };

        rec.start();
        const total = photos.length;
        const holdF = Math.max(1, Math.round((settings.frameDur / 1000) * settings.fps));
        const fd = 1000 / settings.fps;

        for (let i = 0; i < total; i++) {
          setProgress((i / total) * 90, `Kare ${i + 1}/${total}...`);
          for (let f = 0; f < holdF; f++) {
            ctx.fillStyle = settings.bgColor;
            ctx.fillRect(0, 0, off.width, off.height);
            drawImageFit(ctx, photos[i].img, 0, 0, off.width, off.height, i);
            drawText(ctx, settings.text, off.width, off.height);
            await sleep(fd / 1000);
          }
        }
        await sleep(200);
        rec.stop();
        setProgress(92, 'Kodlama tamamlanıyor...');
      } catch (err) {
        renderOverlay.classList.remove('show');
        lockSettings(false);
        alert('MP4/WebM hatası: ' + err.message);
      }
    }

    // Accordion Toggle
    document.querySelectorAll('.acc-header').forEach(header => {
      header.addEventListener('click', () => {
        header.parentElement.classList.toggle('open');
      });
    });

    // Drag & Drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      [...e.dataTransfer.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = (evt) => {
          const img = new Image();
          img.onload = () => {
            photos.push({ 
              img, 
              panX: 0, 
              panY: 0, 
              zoomScale: 1 
            });
            addPhotoThumb();
            updateTotalFrames();
            resizePreview();
          };
          img.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      });
    });

    // Export Button Events
    exportGifBtn.addEventListener('click', exportGIF);
    exportMp4Btn.addEventListener('click', exportMP4);

    // Init
    updateAspectBadge();
    requestAnimationFrame(() => requestAnimationFrame(() => resizePreview()));
  </script>
</body>
</html>
