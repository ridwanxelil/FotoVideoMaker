<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoMotion — Fotoğraf Animasyon Stüdyosu</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23ff6b35' width='100' height='100'/%3E%3Ccircle cx='50' cy='40' r='20' fill='%23fff'/%3E%3Cpath d='M30 70 Q50 50 70 70' fill='none' stroke='%23fff' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #ff6b35;
      --accent2: #7c3aed;
      --accent3: #06d6a0;
      --text: #e8e8f0;
      --text-muted: #6b6b8a;
      --sidebar-w: 270px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Syne', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      height: 100vh; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
    }

    /* HEADER */
    header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 10px 20px; 
      background: var(--surface); 
      border-bottom: 1px solid var(--border); 
      z-index: 10; 
      flex-shrink: 0; 
    }
    .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn { 
      padding: 7px 16px; 
      border-radius: 8px; 
      border: none; 
      cursor: pointer; 
      font-family: 'Syne', sans-serif; 
      font-weight: 600; 
      font-size: 12px; 
      transition: all 0.2s; 
    }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #ff8555; transform: translateY(-1px); }
    .btn-secondary { background: var(--accent2); color: #fff; }
    .btn-secondary:hover { background: #9d5df5; transform: translateY(-1px); }

    /* LAYOUT */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* SIDEBARS */
    .sidebar { 
      width: var(--sidebar-w); 
      background: var(--surface); 
      display: flex; 
      flex-direction: column; 
      overflow-y: auto; 
      overflow-x: hidden; 
      flex-shrink: 0; 
    }
    .sidebar.left { border-right: 1px solid var(--border); }
    .sidebar.right { border-left: 1px solid var(--border); }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ACCORDION */
    .acc-section { border-bottom: 1px solid var(--border); }
    .acc-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 13px 16px; 
      cursor: pointer; 
      user-select: none; 
      transition: background 0.15s; 
    }
    .acc-header:hover { background: var(--surface2); }
    .acc-title { 
      font-size: 10px; 
      font-weight: 700; 
      letter-spacing: 1.8px; 
      text-transform: uppercase; 
      color: var(--text-muted); 
      font-family: 'JetBrains Mono', monospace; 
    }
    .acc-arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
    .acc-section.open .acc-arrow { transform: rotate(180deg); }
    .acc-body { display: none; padding: 4px 16px 14px; }
    .acc-section.open .acc-body { display: block; }

    /* CONTROLS */
    .control-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 11px; }
    .control-row:last-child { margin-bottom: 0; }
    .control-label { 
      font-size: 11px; 
      color: var(--text-muted); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .control-label .val { 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 10px; 
      color: var(--accent3); 
    }

    input[type=range] { 
      -webkit-appearance: none; 
      width: 100%; 
      height: 3px; 
      background: var(--border); 
      border-radius: 2px; 
      outline: none; 
    }
    input[type=range]::-webkit-slider-thumb { 
      -webkit-appearance: none; 
      width: 13px; 
      height: 13px; 
      border-radius: 50%; 
      background: var(--accent); 
      cursor: pointer; 
      transition: transform 0.15s; 
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    select, input[type=number]:not(.slider-num), input[type=text] { 
      width: 100%; 
      background: var(--bg); 
      border: 1px solid var(--border); 
      color: var(--text); 
      padding: 6px 9px; 
      border-radius: 7px; 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 11px; 
      outline: none; 
      transition: border-color 0.2s; 
    }
    select:focus, input[type=number]:not(.slider-num):focus, input[type=text]:focus { border-color: var(--accent); }

    .format-toggle { 
      display: flex; 
      border-radius: 8px; 
      overflow: hidden; 
      border: 1px solid var(--border); 
    }
    .format-toggle button { 
      flex: 1; 
      padding: 7px; 
      background: transparent; 
      border: none; 
      color: var(--text-muted); 
      font-family: 'Syne', sans-serif; 
      font-weight: 700; 
      font-size: 11px; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    .format-toggle button.active { background: var(--accent); color: #fff; }

    .effect-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .effect-card { 
      background: var(--bg); 
      border: 1px solid var(--border); 
      border-radius: 7px; 
      padding: 8px 5px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.2s; 
      font-size: 9px; 
      color: var(--text-muted); 
    }
    .effect-card:hover { border-color: var(--accent); color: var(--text); }
    .effect-card.active { border-color: var(--accent); background: rgba(255,107,53,0.1); color: var(--accent); }
    .effect-card .icon { font-size: 15px; margin-bottom: 2px; display: block; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .slider-row { display: flex; align-items: center; gap: 6px; }
    .slider-row input[type=range] { flex: 1; }
    .slider-num {
      width: 50px;
      flex-shrink: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--accent3);
      padding: 3px 5px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .slider-num::-webkit-inner-spin-button,
    .slider-num::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .slider-num:focus { border-color: var(--accent); }

    input[type=color] { 
      width: 100%; 
      height: 32px; 
      border: 1px solid var(--border); 
      border-radius: 7px; 
      background: var(--bg); 
      cursor: pointer; 
      padding: 2px; 
    }

    /* CENTER PANEL */
    .center-panel { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      background: var(--bg); 
      min-width: 0; 
    }

    .preview-wrap { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-start; 
      padding: 14px 14px 0; 
      position: relative; 
      background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg) 70%); 
      min-height: 0; 
      overflow: hidden; 
    }
    .preview-canvas-wrap { 
      position: relative; 
      border-radius: 10px; 
      overflow: hidden; 
      box-shadow: 0 0 0 1px var(--border), 0 16px 50px rgba(0,0,0,0.6); 
      cursor: grab; 
      user-select: none; 
      background: #111; 
      flex-shrink: 0; 
    }
    .preview-canvas-wrap:active { cursor: grabbing; }
    #previewCanvas { display: block; }

    .preview-empty { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      width: 100%; 
      height: 200px; 
      border: 2px dashed var(--border); 
      border-radius: 12px; 
      color: var(--text-muted); 
      gap: 8px; 
    }
    .preview-empty .big-icon { font-size: 40px; opacity: 0.4; }

    .zoom-controls { 
      position: absolute; 
      bottom: 8px; 
      right: 16px; 
      display: flex; 
      gap: 5px; 
      align-items: center; 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 9px; 
      padding: 4px 9px; 
    }
    .zoom-btn { 
      width: 24px; 
      height: 24px; 
      border-radius: 5px; 
      background: var(--bg); 
      border: 1px solid var(--border); 
      color: var(--text); 
      cursor: pointer; 
      font-size: 13px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.15s; 
    }
    .zoom-btn:hover { background: var(--accent); border-color: var(--accent); }
    .zoom-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); min-width: 36px; text-align: center; }
    .aspect-badge { 
      position: absolute; 
      top: 8px; 
      left: 16px; 
      background: rgba(0,0,0,0.6); 
      border: 1px solid var(--border); 
      border-radius: 6px; 
      padding: 2px 7px; 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 9px; 
      color: var(--accent3); 
      pointer-events: none; 
    }

    /* PLAYBACK */
    .playback-bar { 
      flex-shrink: 0; 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      padding: 8px 16px; 
      background: var(--surface); 
      border-top: 1px solid var(--border); 
      border-bottom: 1px solid var(--border); 
    }
    .play-btn { 
      width: 32px; 
      height: 32px; 
      border-radius: 50%; 
      background: var(--accent); 
      border: none; 
      color: #fff; 
      font-size: 13px; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.2s; 
      flex-shrink: 0; 
    }
    .play-btn:hover { background: #ff8555; transform: scale(1.1); }
    .timeline-wrap { flex: 1; position: relative; height: 5px; background: var(--border); border-radius: 3px; cursor: pointer; }
    .timeline-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.1s linear; }
    .frame-info { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

    /* PHOTO STRIP */
    .photo-strip-wrap { 
      flex-shrink: 0; 
      display: flex; 
      flex-direction: column; 
      background: var(--surface); 
      border-top: 1px solid var(--border); 
    }
    .strip-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 7px 16px 4px; 
      flex-shrink: 0; 
    }
    .strip-title { 
      font-size: 9px; 
      font-weight: 700; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
      color: var(--text-muted); 
      font-family: 'JetBrains Mono', monospace; 
    }
    .photo-strip { 
      display: flex; 
      gap: 8px; 
      padding: 4px 16px 10px; 
      overflow-x: auto; 
      overflow-y: hidden; 
      align-items: flex-end; 
    }
    .photo-strip::-webkit-scrollbar { height: 3px; }
    .photo-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .drop-zone { 
      min-width: 72px; 
      height: 68px; 
      border: 2px dashed var(--border); 
      border-radius: 9px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer; 
      color: var(--text-muted); 
      font-size: 10px; 
      gap: 3px; 
      flex-shrink: 0; 
      transition: all 0.2s; 
    }
    .drop-zone:hover, .drop-zone.dragover { 
      border-color: var(--accent); 
      color: var(--accent); 
      background: rgba(255,107,53,0.04); 
    }
    .drop-zone .plus { font-size: 20px; }

    .photo-thumb { 
      position: relative; 
      width: 68px; 
      height: 68px; 
      flex-shrink: 0; 
      border-radius: 9px; 
      overflow: hidden; 
      cursor: pointer; 
      border: 2px solid transparent; 
      transition: all 0.2s; 
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .photo-thumb:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .photo-thumb.active { border-color: var(--accent); }
    .photo-thumb .close-btn { 
      position: absolute; 
      top: 2px; 
      right: 2px; 
      width: 20px; 
      height: 20px; 
      background: rgba(0,0,0,0.7); 
      border: none; 
      border-radius: 4px; 
      color: #fff; 
      cursor: pointer; 
      font-size: 12px; 
      display: none; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.15s; 
    }
    .photo-thumb:hover .close-btn { display: flex; }
    .photo-thumb .close-btn:hover { background: rgba(255,107,53,0.9); }

    .motion-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 9px; }
    .motion-btn { 
      padding: 7px 4px; 
      background: var(--bg); 
      border: 1px solid var(--border); 
      border-radius: 7px; 
      color: var(--text-muted); 
      font-size: 9px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.2s; 
      font-family: 'Syne', sans-serif; 
      font-weight: 600; 
    }
    .motion-btn:hover { border-color: var(--accent2); color: var(--text); }
    .motion-btn.active { border-color: var(--accent2); background: rgba(124,58,237,0.12); color: var(--accent2); }
    .motion-btn .mi { display: block; font-size: 14px; margin-bottom: 2px; }

    .badge { 
      display: inline-block; 
      padding: 2px 7px; 
      border-radius: 4px; 
      font-size: 10px; 
      font-weight: 700; 
      letter-spacing: 0.5px; 
      font-family: 'JetBrains Mono', monospace; 
    }
    .badge-green { background: rgba(6,214,160,0.15); color: var(--accent3); }

    /* MODAL */
    #renderOverlay { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.8); 
      z-index: 100; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
    }
    #renderOverlay.show { display: flex; }
    .render-modal { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      padding: 32px; 
      text-align: center; 
      max-width: 400px; 
    }
    .render-icon { font-size: 48px; margin-bottom: 16px; animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .render-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .render-status { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .progress-bar { 
      width: 100%; 
      height: 6px; 
      background: var(--border); 
      border-radius: 3px; 
      overflow: hidden; 
      margin-bottom: 8px; 
    }
    .progress-fill { 
      height: 100%; 
      background: var(--accent); 
      width: 0%; 
      transition: width 0.3s; 
    }
    .progress-percent { font-size: 11px; color: var(--accent3); font-family: 'JetBrains Mono', monospace; }

    /* ── MOBILE BOTTOM NAV ─────────────────────────────────────────────── */
    .mobile-bottom-nav {
      display: none;
    }
    .mob-panel {
      display: none;
    }

    @media (max-width: 768px) {
      body { overflow: hidden; }

      /* Hide desktop left sidebar */
      .sidebar.left { display: none !important; }

      /* Full width center */
      .app-body { flex-direction: column; }
      .center-panel { width: 100%; }

      /* Bottom nav bar */
      .mobile-bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        z-index: 50;
        height: 56px;
        align-items: stretch;
      }
      .mob-tab {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        font-family: 'JetBrains Mono', monospace;
        border: none;
        background: transparent;
        transition: color 0.15s, background 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .mob-tab .mob-icon { font-size: 18px; line-height: 1; }
      .mob-tab.active { color: var(--accent); background: rgba(255,107,53,0.07); }
      .mob-tab:active { background: rgba(255,107,53,0.12); }

      /* Mobile panel drawer */
      .mob-panel {
        display: none;
        position: fixed;
        bottom: 56px; left: 0; right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        z-index: 49;
        max-height: 55vh;
        overflow-y: auto;
        padding: 12px 16px 16px;
      }
      .mob-panel.active { display: block; }
      .mob-panel::-webkit-scrollbar { width: 3px; }
      .mob-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      /* Push content up for nav bar */
      .photo-strip-wrap { padding-bottom: 60px; }

      /* Compact header on mobile */
      header { padding: 8px 12px; }
      .logo { font-size: 15px; }
      .btn { padding: 6px 11px; font-size: 11px; }

      /* Preview area smaller on mobile */
      .preview-wrap { padding: 8px 8px 0; }

      /* Mobile panel sections */
      .mob-section-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-muted);
        font-family: 'JetBrains Mono', monospace;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }
      .mob-section + .mob-section { margin-top: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Photo<span>Motion</span></div>
    <div class="header-actions">
    </div>
  </header>

  <div class="app-body">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar left" id="leftSidebar">
      <div class="acc-section open">
        <div class="acc-header">
          <span class="acc-title">⚙️ Ayarlar</span>
          <span class="acc-arrow">▼</span>
        </div>
        <div class="acc-body">
          <div class="control-row">
            <label class="control-label">Genişlik <span class="val" id="widthVal">1920</span>px</label>
            <div class="slider-row">
              <input type="range" id="widthSlider" min="640" max="4096" value="1920" step="16">
              <input type="number" class="slider-num" id="widthNum" min="640" max="4096" value="1920" step="16">
            </div>
          </div>
          <div class="control-row">
            <label class="control-label">Yükseklik <span class="val" id="heightVal">1080</span>px</label>
            <div class="slider-row">
              <input type="range" id="heightSlider" min="360" max="4096" value="1080" step="16">
              <input type="number" class="slider-num" id="heightNum" min="360" max="4096" value="1080" step="16">
            </div>
          </div>
          <div class="control-row">
            <select id="aspectRatio">
              <option value="custom">Özel Oran</option>
              <option value="1920x1080">1920x1080 (16:9)</option>
              <option value="1080x1920">1080x1920 (9:16)</option>
              <option value="1080x1080">1080x1080 (1:1)</option>
              <option value="1280x960">1280x960 (4:3)</option>
              <option value="1920x1280">1920x1280 (3:2)</option>
              <option value="2560x1080">2560x1080 (21:9)</option>
            </select>
          </div>
          <div class="control-row">
            <label class="control-label">FPS <span class="val" id="fpsVal">1</span></label>
            <div class="slider-row">
              <input type="range" id="fpsSlider" min="1" max="60" value="1">
              <input type="number" class="slider-num" id="fpsNum" min="1" max="60" value="1">
            </div>
          </div>
          <div class="control-row">
            <label class="control-label">Bitrate <span class="val" id="bitrateVal">25</span>Mbps</label>
            <div class="slider-row">
              <input type="range" id="bitrateSlider" min="1" max="50" value="25">
              <input type="number" class="slider-num" id="bitrateNum" min="1" max="50" value="25">
            </div>
          </div>
        </div>
      </div>

      <div class="acc-section open">
        <div class="acc-header">
          <span class="acc-title">🎬 Animasyon</span>
          <span class="acc-arrow">▼</span>
        </div>
        <div class="acc-body">
          <div class="control-row">
            <label class="control-label">Kare Süresi <span class="val" id="frameDurVal">5000</span>ms</label>
            <div class="slider-row">
              <input type="range" id="frameDurSlider" min="500" max="10000" value="5000" step="100">
              <input type="number" class="slider-num" id="frameDurNum" min="500" max="10000" value="5000" step="100">
            </div>
          </div>
        </div>
      </div>



      <div class="acc-section open">
        <div class="acc-header">
          <span class="acc-title">📍 Konum Ayarları</span>
          <span class="acc-arrow">▼</span>
        </div>
        <div class="acc-body">
          <div class="control-row" style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
            <label class="control-label" style="color: var(--accent);">
              Seçili Fotoğraf: <span id="selectedPhotoLabel" style="font-weight: 700;">Hiçbiri</span>
            </label>
          </div>
          <div class="control-row">
            <label class="control-label">Yatay Kaydır <span class="val" id="panXVal">0</span>%</label>

  <script>
  /* ── GIF Encoder with Median-Cut quantization ──────────────────────────
     Produces accurate colors — no filtering artifacts.
     Uses median-cut to find the 256 most representative colors per frame,
     then nearest-neighbor mapping + LZW compression.                      */
  (function(global){

    // ── Median-cut color quantization ────────────────────────────────────
    function medianCut(pixels, maxColors) {
      // Sample pixels (skip alpha, sample every 4th pixel for speed)
      const sample = [];
      for (let i = 0; i < pixels.length; i += 16) {
        if (pixels[i+3] > 0) sample.push([pixels[i], pixels[i+1], pixels[i+2]]);
      }
      if (sample.length === 0) {
        const pal = []; for (let i=0;i<maxColors;i++) pal.push([0,0,0]); return pal;
      }

      function split(bucket) {
        // Find channel with greatest range
        let minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
        for (const [r,g,b] of bucket) {
          if(r<minR)minR=r; if(r>maxR)maxR=r;
          if(g<minG)minG=g; if(g>maxG)maxG=g;
          if(b<minB)minB=b; if(b>maxB)maxB=b;
        }
        const rng = [maxR-minR, maxG-minG, maxB-minB];
        const ch = rng.indexOf(Math.max(...rng)); // 0=R,1=G,2=B
        bucket.sort((a,b) => a[ch] - b[ch]);
        const mid = Math.floor(bucket.length / 2);
        return [bucket.slice(0, mid), bucket.slice(mid)];
      }

      function avg(bucket) {
        let r=0,g=0,b=0;
        for (const c of bucket) { r+=c[0]; g+=c[1]; b+=c[2]; }
        const n = bucket.length;
        return [Math.round(r/n), Math.round(g/n), Math.round(b/n)];
      }

      let buckets = [sample];
      while (buckets.length < maxColors) {
        // Split the largest bucket
        let li = 0;
        for (let i=1; i<buckets.length; i++) if (buckets[i].length > buckets[li].length) li = i;
        if (buckets[li].length < 2) break;
        const [a, b] = split(buckets[li]);
        buckets.splice(li, 1, a, b);
      }

      const palette = buckets.map(avg);
      // Pad to power of 2 (required by GIF spec)
      let size = 2; while (size < palette.length) size <<= 1;
      while (palette.length < size) palette.push([0,0,0]);
      return palette;
    }

    // ── Nearest-neighbor palette mapping ─────────────────────────────────
    function applyPalette(pixels, palette) {
      const n = pixels.length >> 2;
      const index = new Uint8Array(n);
      // Build a fast lookup cache with quantized keys
      const cache = new Map();
      for (let i = 0; i < n; i++) {
        const o = i << 2;
        // Quantize to 5-bit per channel for cache key
        const key = ((pixels[o]>>3)<<10) | ((pixels[o+1]>>3)<<5) | (pixels[o+2]>>3);
        if (cache.has(key)) {
          index[i] = cache.get(key);
          continue;
        }
        let best = 0, bestD = Infinity;
        const r = pixels[o], g = pixels[o+1], b = pixels[o+2];
        for (let j = 0; j < palette.length; j++) {
          const dr = r - palette[j][0], dg = g - palette[j][1], db = b - palette[j][2];
          const d = dr*dr + dg*dg + db*db;
          if (d < bestD) { bestD = d; best = j; if (d === 0) break; }
        }
        index[i] = best;
        cache.set(key, best);
      }
      return index;
    }

    // ── LZW encoder ──────────────────────────────────────────────────────
    function lzwEncode(pixels, minCodeSize) {
      const out = [];
      let pos = 0, accum = 0;
      function emit(code, bits) {
        accum |= code << pos; pos += bits;
        while (pos >= 8) { out.push(accum & 0xFF); accum >>= 8; pos -= 8; }
      }
      const clr = 1 << minCodeSize, eoi = clr + 1;
      let codeSize = minCodeSize + 1, nextCode = eoi + 1, maxCode = 1 << codeSize;
      const table = new Map();
      emit(clr, codeSize);
      let prefix = pixels[0];
      for (let i = 1; i < pixels.length; i++) {
        const suffix = pixels[i];
        const key = (prefix << 8) | suffix;
        if (table.has(key)) {
          prefix = table.get(key);
        } else {
          emit(prefix, codeSize);
          if (nextCode < 4096) {
            table.set(key, nextCode++);
            if (nextCode > maxCode) { codeSize++; maxCode <<= 1; }
          } else {
            emit(clr, codeSize);
            table.clear(); nextCode = eoi + 1; codeSize = minCodeSize + 1; maxCode = 1 << codeSize;
          }
          prefix = suffix;
        }
      }
      emit(prefix, codeSize);
      emit(eoi, codeSize);
      if (pos > 0) out.push(accum & 0xFF);
      return out;
    }

    function writeSubBlocks(out, data) {
      let i = 0;
      while (i < data.length) {
        const n = Math.min(255, data.length - i);
        out.push(n);
        for (let j = 0; j < n; j++) out.push(data[i++]);
      }
      out.push(0);
    }

    // ── GIF Encoder ──────────────────────────────────────────────────────
    function GIFEncoder() {
      const out = [];
      let firstFrame = true;

      // GIF89a header
      [0x47,0x49,0x46,0x38,0x39,0x61].forEach(b => out.push(b));

      function writeFrame(indexedPixels, w, h, opts) {
        const palette   = opts.palette || [[0,0,0],[255,255,255]];
        const delay     = opts.delay !== undefined ? opts.delay : 10; // centiseconds
        const palBits   = Math.max(2, Math.ceil(Math.log2(palette.length)));
        const palSize   = 1 << palBits;

        if (firstFrame) {
          // Logical Screen Descriptor
          out.push(w & 0xFF, w >> 8, h & 0xFF, h >> 8);
          out.push(0x80 | (palBits - 1)); // global color table flag + size
          out.push(0); // background color index
          out.push(0); // pixel aspect ratio
          // Global Color Table
          for (let i = 0; i < palSize; i++) {
            const c = palette[i] || [0,0,0];
            out.push(c[0], c[1], c[2]);
          }
          // Netscape Application Extension (loop forever)
          out.push(0x21,0xFF,0x0B);
          [78,69,84,83,67,65,80,69,50,46,48].forEach(b=>out.push(b)); // NETSCAPE2.0
          out.push(0x03,0x01,0x00,0x00,0x00);
          firstFrame = false;
        }

        // Graphic Control Extension
        out.push(0x21, 0xF9, 0x04);
        out.push(0x00);                   // disposal: do not dispose
        out.push(delay & 0xFF, delay >> 8); // delay in centiseconds
        out.push(0x00);                   // transparent color index (none)
        out.push(0x00);                   // block terminator

        // Image Descriptor — use local color table per frame for accuracy
        out.push(0x2C);
        out.push(0,0, 0,0);              // left, top = 0,0
        out.push(w & 0xFF, w >> 8, h & 0xFF, h >> 8);
        out.push(0x80 | (palBits - 1)); // local color table flag + size
        // Local Color Table
        for (let i = 0; i < palSize; i++) {
          const c = palette[i] || [0,0,0];
          out.push(c[0], c[1], c[2]);
        }

        // Image Data
        const minCode = Math.max(2, palBits);
        out.push(minCode);
        writeSubBlocks(out, lzwEncode(indexedPixels, minCode));
      }

      function finish() { out.push(0x3B); }

      function bytes() { return new Uint8Array(out); }

      return { writeFrame, finish, bytes };
    }

    global.gifenc = { GIFEncoder, quantize: medianCut, applyPalette };
    global.GIFEncoder = GIFEncoder;
    global.quantize = medianCut;
    global.applyPalette = applyPalette;

  })(window);
  </script>

  <script>
    const photos = [];
    let playbackState = false;
    let currentFrame = 0;
    let totalFrames = 0;
    let startTime = 0;
    let selectedPhotoIndex = -1;

    const settings = {
      width: 1920,
      height: 1080,
      fps: 1,
      bitrate: 25,
      frameDur: 5000,
      panX: 0,
      panY: 0,
      zoomScale: 1
    };

    const widthSlider = document.getElementById('widthSlider');
    const heightSlider = document.getElementById('heightSlider');
    const fpsSlider = document.getElementById('fpsSlider');
    const bitrateSlider = document.getElementById('bitrateSlider');
    const frameDurSlider = document.getElementById('frameDurSlider');
    const aspectRatioSelect = document.getElementById('aspectRatio');
    const panXSlider = document.getElementById('panXSlider');
    const panYSlider = document.getElementById('panYSlider');
    const zoomScaleSlider = document.getElementById('zoomScaleSlider');
    const dropZone = document.getElementById('dropZone');
    const photoStrip = document.getElementById('photoStrip');
    const previewCanvas = document.getElementById('previewCanvas');
    const playBtn = document.getElementById('playBtn');
    const timelineWrap = document.getElementById('timelineWrap');
    const timelineFill = document.getElementById('timelineFill');
    const frameInfo = document.getElementById('frameInfo');
    const exportGifBtn = document.getElementById('exportGifBtn');
    const exportMp4Btn = document.getElementById('exportMp4Btn');
    const renderOverlay = document.getElementById('renderOverlay');
    const progressFill = document.getElementById('progressFill');
    const renderStatus = document.getElementById('renderStatus');
    const progressPercent = document.getElementById('progressPercent');

    // Utility Functions
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function updateValueDisplay(element, value) {
      const valElement = element.parentElement.querySelector('.val');
      if (valElement) valElement.textContent = value;
    }

    function setProgress(percent, status) {
      progressFill.style.width = percent + '%';
      progressPercent.textContent = Math.round(percent) + '%';
      if (status) renderStatus.textContent = status;
    }

    function lockSettings(locked) {
      document.querySelectorAll('#leftSidebar input, #leftSidebar select').forEach(el => {
        el.disabled = locked;
      });
    }

    // --- Number input sync helper ---
    function syncSliderNum(slider, numInput, onchange) {
      slider.addEventListener('input', (e) => {
        const v = parseFloat(e.target.value);
        numInput.value = v;
        onchange(v);
      });
      numInput.addEventListener('input', (e) => {
        let v = parseFloat(e.target.value);
        if (isNaN(v)) return;
        v = Math.max(parseFloat(slider.min), Math.min(parseFloat(slider.max), v));
        slider.value = v;
        numInput.value = v;
        onchange(v);
      });
    }

    // Slider + Number events
    syncSliderNum(widthSlider, document.getElementById('widthNum'), (v) => {
      settings.width = Math.round(v);
      document.getElementById('widthVal').textContent = settings.width;
      resizePreview();
    });

    syncSliderNum(heightSlider, document.getElementById('heightNum'), (v) => {
      settings.height = Math.round(v);
      document.getElementById('heightVal').textContent = settings.height;
      resizePreview();
    });

    syncSliderNum(fpsSlider, document.getElementById('fpsNum'), (v) => {
      settings.fps = Math.round(v);
      document.getElementById('fpsVal').textContent = settings.fps;
    });

    syncSliderNum(bitrateSlider, document.getElementById('bitrateNum'), (v) => {
      settings.bitrate = Math.round(v);
      document.getElementById('bitrateVal').textContent = settings.bitrate;
    });

    syncSliderNum(frameDurSlider, document.getElementById('frameDurNum'), (v) => {
      settings.frameDur = Math.round(v);
      document.getElementById('frameDurVal').textContent = settings.frameDur;
      updateTotalFrames();
    });

    syncSliderNum(panXSlider, document.getElementById('panXNum'), (v) => {
      if (selectedPhotoIndex >= 0) photos[selectedPhotoIndex].panX = v;
      else settings.panX = v;
      document.getElementById('panXVal').textContent = Math.round(v);
      resizePreview();
    });

    syncSliderNum(panYSlider, document.getElementById('panYNum'), (v) => {
      if (selectedPhotoIndex >= 0) photos[selectedPhotoIndex].panY = v;
      else settings.panY = v;
      document.getElementById('panYVal').textContent = Math.round(v);
      resizePreview();
    });

    syncSliderNum(zoomScaleSlider, document.getElementById('zoomScaleNum'), (v) => {
      const scale = v / 100;
      if (selectedPhotoIndex >= 0) photos[selectedPhotoIndex].zoomScale = scale;
      else settings.zoomScale = scale;
      document.getElementById('zoomScaleVal').textContent = Math.round(v);
      resizePreview();
    });

    aspectRatioSelect.addEventListener('change', (e) => {
      const value = e.target.value;
      if (value !== 'custom') {
        const [w, h] = value.split('x').map(Number);
        settings.width = w;
        settings.height = h;
        widthSlider.value = settings.width;
        heightSlider.value = settings.height;
        updateValueDisplay(widthSlider, settings.width);
        updateValueDisplay(heightSlider, settings.height);
        resizePreview();
      }
    });

    // Photo Management
    dropZone.addEventListener('click', () => document.createElement('input').setAttribute('type', 'file'), false);
    
    const fileInput = (() => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.addEventListener('change', (e) => {
        [...e.target.files].forEach(file => {
          const reader = new FileReader();
          reader.onload = (evt) => {
            const img = new Image();
            img.onload = () => {
              photos.push({ 
                img, 
                panX: 0, 
                panY: 0, 
                zoomScale: 1 
              });
              addPhotoThumb();
              updateTotalFrames();
              resizePreview();
            };
            img.src = evt.target.result;
          };
          reader.readAsDataURL(file);
        });
      });
      return input;
    })();

    dropZone.addEventListener('click', () => fileInput.click());

    function addPhotoThumb() {
      const photoIdx = photos.length - 1;
      const photo = photos[photoIdx];
      
      // Initialize photo with individual position settings (use explicit undefined check)
      if (photo.panX === undefined) photo.panX = 0;
      if (photo.panY === undefined) photo.panY = 0;
      if (photo.zoomScale === undefined) photo.zoomScale = 1;
      
      const thumb = document.createElement('div');
      thumb.className = 'photo-thumb';
      thumb.innerHTML = `<img src="${photo.img.src}">
        <button class="close-btn">×</button>`;
      
      thumb.addEventListener('click', () => {
        document.querySelectorAll('.photo-thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
        selectedPhotoIndex = photoIdx;
        
        document.getElementById('selectedPhotoLabel').textContent = `Fotoğraf ${photoIdx + 1}`;
        
        // Sync all sidebar controls (slider + number input + label)
        const px = photo.panX;
        const py = photo.panY;
        const zp = Math.round(photo.zoomScale * 100);

        panXSlider.value = px;
        document.getElementById('panXNum').value = px;
        document.getElementById('panXVal').textContent = Math.round(px);

        panYSlider.value = py;
        document.getElementById('panYNum').value = py;
        document.getElementById('panYVal').textContent = Math.round(py);

        zoomScaleSlider.value = zp;
        document.getElementById('zoomScaleNum').value = zp;
        document.getElementById('zoomScaleVal').textContent = zp;

        // Also sync mobile konum panel
        document.getElementById('mPanXSlider').value = px;
        document.getElementById('mPanXNum').value = px;
        document.getElementById('mPanXVal').textContent = Math.round(px);
        document.getElementById('mPanYSlider').value = py;
        document.getElementById('mPanYNum').value = py;
        document.getElementById('mPanYVal').textContent = Math.round(py);
        document.getElementById('mZoomScaleSlider').value = zp;
        document.getElementById('mZoomScaleNum').value = zp;
        document.getElementById('mZoomScaleVal').textContent = zp;
        document.getElementById('mSelectedPhotoLabel').textContent = `Fotoğraf ${photoIdx + 1}`;
        
        resizePreview();
      });
      
      thumb.querySelector('.close-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = [...photoStrip.querySelectorAll('.photo-thumb')].indexOf(thumb);
        photos.splice(idx, 1);
        if (selectedPhotoIndex === idx) {
          selectedPhotoIndex = -1;
          document.getElementById('selectedPhotoLabel').textContent = 'Hiçbiri';
          document.getElementById('mSelectedPhotoLabel').textContent = 'Hiçbiri';
        } else if (selectedPhotoIndex > idx) {
          selectedPhotoIndex--;
        }
        thumb.remove();
        updateTotalFrames();
        resizePreview();
      });

      photoStrip.insertBefore(thumb, dropZone);
    }

    function updateTotalFrames() {
      totalFrames = 0;
      for (let i = 0; i < photos.length; i++) {
        totalFrames += Math.max(1, Math.round((settings.frameDur / 1000) * settings.fps));
      }
    }

    function resizePreview() {
      const ctx = previewCanvas.getContext('2d');
      const wrap = document.getElementById('previewCanvasWrap');
      
      const maxWidth = wrap.parentElement.offsetWidth - 28;
      const maxHeight = wrap.parentElement.offsetHeight - 28;
      let scale = Math.min(maxWidth / settings.width, maxHeight / settings.height);
      scale = Math.min(1, Math.max(0.1, scale));

      previewCanvas.width = settings.width;
      previewCanvas.height = settings.height;
      wrap.style.width = (settings.width * scale) + 'px';
      wrap.style.height = (settings.height * scale) + 'px';

      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, settings.width, settings.height);

      if (photos.length > 0) {
        const photoIdx = selectedPhotoIndex >= 0 ? selectedPhotoIndex : 0;
        drawImageFit(ctx, photos[photoIdx].img, 0, 0, settings.width, settings.height, photoIdx);
      }

      updateAspectBadge();
    }

    function drawImageFit(ctx, img, x, y, w, h, photoIdx) {
      const iw = img.width, ih = img.height;
      
      // Get individual photo settings or use global
      let panX = 0, panY = 0, zoomScale = 1;
      if (photoIdx !== undefined && photos[photoIdx]) {
        panX = photos[photoIdx].panX ?? 0;
        panY = photos[photoIdx].panY ?? 0;
        zoomScale = photos[photoIdx].zoomScale ?? 1;
      } else {
        panX = settings.panX;
        panY = settings.panY;
        zoomScale = settings.zoomScale;
      }

      // Use cover-like contain: fill the area while maintaining aspect ratio
      // Then allow pan/zoom for user positioning
      const scale = Math.max(w / iw, h / ih); // Use MAX for full coverage
      const scaledW = iw * scale;
      const scaledH = ih * scale;
      
      // Center the image
      let dx = x + (w - scaledW) / 2;
      let dy = y + (h - scaledH) / 2;

      // Apply pan
      const panOffsetX = (w * panX) / 100;
      const panOffsetY = (h * panY) / 100;

      // Apply zoom
      const zoomedW = scaledW * zoomScale;
      const zoomedH = scaledH * zoomScale;
      
      dx = x + (w - zoomedW) / 2 + panOffsetX;
      dy = y + (h - zoomedH) / 2 + panOffsetY;

      ctx.drawImage(img, dx, dy, zoomedW, zoomedH);
    }

    function buildFrameCanvas(photoIdx) {
      const c = document.createElement('canvas');
      c.width = settings.width; c.height = settings.height;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, settings.width, settings.height);
      drawImageFit(ctx, photos[photoIdx].img, 0, 0, settings.width, settings.height, photoIdx);
      return c;
    }

    // Preview Mouse & Wheel Controls
    let isMouseDown = false;
    let mouseStartX = 0;
    let mouseStartY = 0;
    let startPanX = 0;
    let startPanY = 0;

    const previewCanvasWrap = document.getElementById('previewCanvasWrap');

    previewCanvasWrap.addEventListener('mousedown', (e) => {
      isMouseDown = true;
      mouseStartX = e.clientX;
      mouseStartY = e.clientY;
      
      if (selectedPhotoIndex >= 0) {
        startPanX = photos[selectedPhotoIndex].panX || 0;
        startPanY = photos[selectedPhotoIndex].panY || 0;
      } else {
        startPanX = settings.panX;
        startPanY = settings.panY;
      }
      
      previewCanvasWrap.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isMouseDown) return;
      
      const deltaX = e.clientX - mouseStartX;
      const deltaY = e.clientY - mouseStartY;
      
      let moveX = (deltaX / settings.width) * 100;
      let moveY = (deltaY / settings.height) * 100;

      // Shift = axis lock (Adobe-style): lock to dominant axis
      if (e.shiftKey) {
        if (Math.abs(deltaX) >= Math.abs(deltaY)) {
          moveY = 0;
        } else {
          moveX = 0;
        }
      }
      
      let newPanX = Math.max(-100, Math.min(100, startPanX + moveX));
      let newPanY = Math.max(-100, Math.min(100, startPanY + moveY));
      
      if (selectedPhotoIndex >= 0) {
        photos[selectedPhotoIndex].panX = newPanX;
        photos[selectedPhotoIndex].panY = newPanY;
      } else {
        settings.panX = newPanX;
        settings.panY = newPanY;
      }
      
      panXSlider.value = newPanX;
      panYSlider.value = newPanY;
      document.getElementById('panXNum').value = Math.round(newPanX);
      document.getElementById('panYNum').value = Math.round(newPanY);
      
      updateValueDisplay(panXSlider, Math.round(newPanX));
      updateValueDisplay(panYSlider, Math.round(newPanY));
      
      resizePreview();
    });

    document.addEventListener('mouseup', () => {
      isMouseDown = false;
      previewCanvasWrap.style.cursor = 'grab';
    });

    // Shift key cursor hint
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Shift' && isMouseDown) previewCanvasWrap.style.cursor = 'crosshair';
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'Shift') previewCanvasWrap.style.cursor = isMouseDown ? 'grabbing' : 'grab';
    });

    previewCanvasWrap.addEventListener('wheel', (e) => {
      e.preventDefault();
      
      const delta = e.deltaY > 0 ? -5 : 5;
      let newZoomScale;
      
      if (selectedPhotoIndex >= 0) {
        newZoomScale = Math.max(0.5, Math.min(3, photos[selectedPhotoIndex].zoomScale + (delta / 100)));
        photos[selectedPhotoIndex].zoomScale = newZoomScale;
      } else {
        newZoomScale = Math.max(0.5, Math.min(3, settings.zoomScale + (delta / 100)));
        settings.zoomScale = newZoomScale;
      }
      
      const zoomPercent = Math.round(newZoomScale * 100);
      zoomScaleSlider.value = zoomPercent;
      document.getElementById('zoomScaleNum').value = zoomPercent;
      
      updateValueDisplay(zoomScaleSlider, zoomPercent);
      resizePreview();
    }, { passive: false });

    // Playback
    playBtn.addEventListener('click', () => {
      playbackState = !playbackState;
      playBtn.textContent = playbackState ? '⏸' : '▶';
      if (playbackState) {
        startTime = performance.now();
        currentFrame = 0;
        animate();
      }
    });

    function getPhotoIndexAtFrame(frame) {
      // Each photo occupies exactly frameDur ms worth of frames at current fps
      const holdF = Math.max(1, Math.round((settings.frameDur / 1000) * settings.fps));
      return Math.min(photos.length - 1, Math.floor(frame / holdF));
    }

    function animate() {
      if (!playbackState) return;
      const elapsed = performance.now() - startTime;
      // Use frameDur directly: which photo index are we on?
      const photoIdx = Math.floor(elapsed / settings.frameDur);
      
      if (photoIdx >= photos.length) {
        playbackState = false;
        playBtn.textContent = '▶';
        currentFrame = 0;
        startTime = performance.now();
        updatePreviewFrame();
        updateTimeline();
        return;
      }

      // Map elapsed to frame number for timeline
      const holdF = Math.max(1, Math.round((settings.frameDur / 1000) * settings.fps));
      currentFrame = photoIdx * holdF + Math.floor(((elapsed % settings.frameDur) / settings.frameDur) * holdF);

      // Draw the correct photo
      const ctx = previewCanvas.getContext('2d');
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, settings.width, settings.height);
      if (photos[photoIdx]) drawImageFit(ctx, photos[photoIdx].img, 0, 0, settings.width, settings.height, photoIdx);

      updateTimeline();
      requestAnimationFrame(animate);
    }

    function updatePreviewFrame() {
      const ctx = previewCanvas.getContext('2d');
      const holdF = Math.max(1, Math.round((settings.frameDur / 1000) * settings.fps));
      
      let accum = 0;
      for (let i = 0; i < photos.length; i++) {
        if (currentFrame < accum + holdF) {
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, settings.width, settings.height);
          drawImageFit(ctx, photos[i].img, 0, 0, settings.width, settings.height, i);
          return;
        }
        accum += holdF;
      }
    }

    function updateTimeline() {
      const pct = (currentFrame / totalFrames) * 100;
      timelineFill.style.width = pct + '%';
      
      const secs = (currentFrame * 1000) / (settings.fps * 1000);
      const total = (totalFrames * 1000) / (settings.fps * 1000);
      
      frameInfo.textContent = formatTime(secs) + ' / ' + formatTime(total);
    }

    function formatTime(ms) {
      const min = Math.floor(ms / 60);
      const sec = Math.floor(ms % 60);
      return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    timelineWrap.addEventListener('click', (e) => {
      const rect = timelineWrap.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      currentFrame = Math.floor(pct * totalFrames);
      updatePreviewFrame();
      updateTimeline();
    });

    // Zoom
    let zoom = 1;
    document.getElementById('zoomInBtn').addEventListener('click', () => {
      zoom = Math.min(3, zoom * 1.2);
      updateZoom();
    });
    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      zoom = Math.max(0.1, zoom / 1.2);
      updateZoom();
    });
    document.getElementById('zoomFitBtn').addEventListener('click', () => {
      zoom = 1;
      updateZoom();
    });

    function updateZoom() {
      const wrap = document.getElementById('previewCanvasWrap');
      wrap.style.transform = `scale(${zoom})`;
      document.getElementById('zoomVal').textContent = Math.round(zoom * 100) + '%';
    }

    function updateAspectBadge() {
      const r = settings.width / settings.height;
      const badge = document.getElementById('aspectBadge');
      if (Math.abs(r - 16/9) < 0.01) badge.textContent = '16:9';
      else if (Math.abs(r - 9/16) < 0.01) badge.textContent = '9:16';
      else if (Math.abs(r - 1) < 0.01) badge.textContent = '1:1';
      else badge.textContent = `${settings.width}×${settings.height}`;
    }

    // Export Functions
    async function exportGIF() {
      if (photos.length === 0) { alert('Lütfen fotoğraf ekleyin!'); return; }

      lockSettings(true);
      renderOverlay.classList.add('show');

      try {
        const { GIFEncoder, quantize, applyPalette } = window.gifenc;

        // GIF delay is in centiseconds. Each photo shows for exactly frameDur ms.
        // We write 1 frame per photo with the correct delay — no holdCount needed.
        // (Multiple duplicate frames would waste space and gain nothing.)
        const delayCenti = Math.round(settings.frameDur / 10);

        const W = settings.width;
        const H = settings.height;

        const encoder = GIFEncoder();
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = W;
        tmpCanvas.height = H;
        const tmpCtx = tmpCanvas.getContext('2d', { willReadFrequently: true });

        for (let i = 0; i < photos.length; i++) {
          setProgress(Math.round((i / photos.length) * 90), `Kare ${i + 1}/${photos.length} işleniyor...`);
          await sleep(0); // yield to UI

          // Draw this photo with its own pan/zoom
          tmpCtx.fillStyle = '#000000';
          tmpCtx.fillRect(0, 0, W, H);
          drawImageFit(tmpCtx, photos[i].img, 0, 0, W, H, i);

          // Get raw RGBA pixels from canvas — no filter applied
          const rawData = tmpCtx.getImageData(0, 0, W, H).data;

          // Median-cut: find 256 best representative colors for this frame
          const palette = quantize(rawData, 256);

          // Map every pixel to nearest palette entry
          const indexed = applyPalette(rawData, palette);

          encoder.writeFrame(indexed, W, H, { palette, delay: delayCenti });
        }

        encoder.finish();
        setProgress(97, 'GIF kaydediliyor...');
        await sleep(0);

        const bytes = encoder.bytes();
        const blob = new Blob([bytes], { type: 'image/gif' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'animation.gif';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 30000);

        setProgress(100, 'Tamamlandı!');
        setTimeout(() => { renderOverlay.classList.remove('show'); lockSettings(false); }, 1500);

      } catch (err) {
        renderOverlay.classList.remove('show');
        lockSettings(false);
        alert('GIF hatası: ' + err.message + '\n' + err.stack);
      }
    }

    async function exportMP4() {
      if (photos.length === 0) {
        alert('Lütfen fotoğraf ekleyin!');
        return;
      }

      try {
        lockSettings(true);
        renderOverlay.classList.add('show');

        const off = document.createElement('canvas');
        off.width = settings.width;
        off.height = settings.height;
        const ctx = off.getContext('2d');
        const mimes = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
        const mimeType = mimes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
        const chunks = [];
        const stream = off.captureStream(settings.fps);
        const rec = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: settings.bitrate * 1_000_000 });

        rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        rec.onstop = () => {
          setProgress(95, 'Video oluşturuluyor...');
          const blob = new Blob(chunks, { type: mimeType });
          const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `animation.${ext}`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 15000);

          setTimeout(() => {
            renderOverlay.classList.remove('show');
            lockSettings(false);
          }, 1500);
        };

        rec.start();
        const total = photos.length;
        // Use actual frameDur from settings — this was the bug
        const holdF = Math.max(1, Math.round((settings.frameDur / 1000) * settings.fps));
        const fd = 1000 / settings.fps;

        for (let i = 0; i < total; i++) {
          setProgress((i / total) * 90, `Kare ${i + 1}/${total}...`);
          for (let f = 0; f < holdF; f++) {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, off.width, off.height);
            drawImageFit(ctx, photos[i].img, 0, 0, off.width, off.height, i);
            await sleep(fd);
          }
        }
        await sleep(200);
        rec.stop();
        setProgress(92, 'Kodlama tamamlanıyor...');
      } catch (err) {
        renderOverlay.classList.remove('show');
        lockSettings(false);
        alert('MP4/WebM hatası: ' + err.message);
      }
    }

    // Accordion Toggle
    document.querySelectorAll('.acc-header').forEach(header => {
      header.addEventListener('click', () => {
        header.parentElement.classList.toggle('open');
      });
    });

    // Drag & Drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      [...e.dataTransfer.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = (evt) => {
          const img = new Image();
          img.onload = () => {
            photos.push({ 
              img, 
              panX: 0, 
              panY: 0, 
              zoomScale: 1 
            });
            addPhotoThumb();
            updateTotalFrames();
            resizePreview();
          };
          img.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      });
    });

    // Export Button Events
    exportGifBtn.addEventListener('click', exportGIF);
    exportMp4Btn.addEventListener('click', exportMP4);

    // ── MOBILE PANEL LOGIC ──────────────────────────────────────────────
    let activeMobPanel = null;

    function mobShowPanel(name, tabEl) {
      const panels = { ayarlar:'mobPanelAyarlar', animasyon:'mobPanelAnimasyon', konum:'mobPanelKonum', export:'mobPanelExport' };
      document.querySelectorAll('.mob-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('active'));
      if (activeMobPanel === name) { activeMobPanel = null; return; }
      activeMobPanel = name;
      document.getElementById(panels[name]).classList.add('active');
      tabEl.classList.add('active');
    }

    // Sync mobile sliders with desktop settings (bidirectional)
    function mSyncSliderNum(slider, numInput, valSpan, onchange) {
      slider.addEventListener('input', e => { const v=parseFloat(e.target.value); numInput.value=v; if(valSpan) valSpan.textContent=Math.round(v); onchange(v); });
      numInput.addEventListener('input', e => { let v=parseFloat(e.target.value); if(isNaN(v)) return; v=Math.max(parseFloat(slider.min),Math.min(parseFloat(slider.max),v)); slider.value=v; numInput.value=v; if(valSpan) valSpan.textContent=Math.round(v); onchange(v); });
    }

    // Helper: sync a mobile slider value from settings
    function syncMobileFromSettings() {
      document.getElementById('mWidthSlider').value = settings.width;
      document.getElementById('mWidthNum').value = settings.width;
      document.getElementById('mWidthVal').textContent = settings.width;
      document.getElementById('mHeightSlider').value = settings.height;
      document.getElementById('mHeightNum').value = settings.height;
      document.getElementById('mHeightVal').textContent = settings.height;
      document.getElementById('mFpsSlider').value = settings.fps;
      document.getElementById('mFpsNum').value = settings.fps;
      document.getElementById('mFpsVal').textContent = settings.fps;
      document.getElementById('mBitrateSlider').value = settings.bitrate;
      document.getElementById('mBitrateNum').value = settings.bitrate;
      document.getElementById('mBitrateVal').textContent = settings.bitrate;
      document.getElementById('mFrameDurSlider').value = settings.frameDur;
      document.getElementById('mFrameDurNum').value = settings.frameDur;
      document.getElementById('mFrameDurVal').textContent = settings.frameDur;
    }

    mSyncSliderNum(document.getElementById('mWidthSlider'), document.getElementById('mWidthNum'), document.getElementById('mWidthVal'), v => {
      settings.width=Math.round(v); document.getElementById('widthSlider').value=v; document.getElementById('widthNum').value=v; document.getElementById('widthVal').textContent=Math.round(v); resizePreview();
    });
    mSyncSliderNum(document.getElementById('mHeightSlider'), document.getElementById('mHeightNum'), document.getElementById('mHeightVal'), v => {
      settings.height=Math.round(v); document.getElementById('heightSlider').value=v; document.getElementById('heightNum').value=v; document.getElementById('heightVal').textContent=Math.round(v); resizePreview();
    });
    mSyncSliderNum(document.getElementById('mFpsSlider'), document.getElementById('mFpsNum'), document.getElementById('mFpsVal'), v => {
      settings.fps=Math.round(v); document.getElementById('fpsSlider').value=v; document.getElementById('fpsNum').value=v; document.getElementById('fpsVal').textContent=Math.round(v);
    });
    mSyncSliderNum(document.getElementById('mBitrateSlider'), document.getElementById('mBitrateNum'), document.getElementById('mBitrateVal'), v => {
      settings.bitrate=Math.round(v); document.getElementById('bitrateSlider').value=v; document.getElementById('bitrateNum').value=v; document.getElementById('bitrateVal').textContent=Math.round(v);
    });
    mSyncSliderNum(document.getElementById('mFrameDurSlider'), document.getElementById('mFrameDurNum'), document.getElementById('mFrameDurVal'), v => {
      settings.frameDur=Math.round(v); document.getElementById('frameDurSlider').value=v; document.getElementById('frameDurNum').value=v; document.getElementById('frameDurVal').textContent=Math.round(v); updateTotalFrames();
    });
    mSyncSliderNum(document.getElementById('mPanXSlider'), document.getElementById('mPanXNum'), document.getElementById('mPanXVal'), v => {
      if(selectedPhotoIndex>=0) photos[selectedPhotoIndex].panX=v; else settings.panX=v;
      panXSlider.value=v; document.getElementById('panXNum').value=v; document.getElementById('panXVal').textContent=Math.round(v); resizePreview();
    });
    mSyncSliderNum(document.getElementById('mPanYSlider'), document.getElementById('mPanYNum'), document.getElementById('mPanYVal'), v => {
      if(selectedPhotoIndex>=0) photos[selectedPhotoIndex].panY=v; else settings.panY=v;
      panYSlider.value=v; document.getElementById('panYNum').value=v; document.getElementById('panYVal').textContent=Math.round(v); resizePreview();
    });
    mSyncSliderNum(document.getElementById('mZoomScaleSlider'), document.getElementById('mZoomScaleNum'), document.getElementById('mZoomScaleVal'), v => {
      const sc=v/100; if(selectedPhotoIndex>=0) photos[selectedPhotoIndex].zoomScale=sc; else settings.zoomScale=sc;
      zoomScaleSlider.value=v; document.getElementById('zoomScaleNum').value=v; document.getElementById('zoomScaleVal').textContent=Math.round(v); resizePreview();
    });

    // Sync mobile konum panel when photo selected
    const origAddPhotoThumb = addPhotoThumb;
    function syncMobileKonum() {
      const lbl = selectedPhotoIndex >= 0 ? `Fotoğraf ${selectedPhotoIndex+1}` : 'Hiçbiri';
      document.getElementById('mSelectedPhotoLabel').textContent = lbl;
      if(selectedPhotoIndex >= 0) {
        const p = photos[selectedPhotoIndex];
        document.getElementById('mPanXSlider').value = p.panX||0;
        document.getElementById('mPanXNum').value = p.panX||0;
        document.getElementById('mPanXVal').textContent = Math.round(p.panX||0);
        document.getElementById('mPanYSlider').value = p.panY||0;
        document.getElementById('mPanYNum').value = p.panY||0;
        document.getElementById('mPanYVal').textContent = Math.round(p.panY||0);
        const zp = Math.round((p.zoomScale||1)*100);
        document.getElementById('mZoomScaleSlider').value = zp;
        document.getElementById('mZoomScaleNum').value = zp;
        document.getElementById('mZoomScaleVal').textContent = zp;
      }
    }
    // Patch desktop thumb click to also update mobile
    const _origAddPhotoThumbFn = window.addPhotoThumb;
    document.addEventListener('click', e => {
      if(e.target.closest && e.target.closest('.photo-thumb')) syncMobileKonum();
    });

    // Mobile aspect ratio select
    document.getElementById('mAspectRatio').addEventListener('change', e => {
      document.getElementById('aspectRatio').value = e.target.value;
      document.getElementById('aspectRatio').dispatchEvent(new Event('change'));
      syncMobileFromSettings();
    });

    // Also keep lockSettings covering mobile inputs
    const _origLockSettings = lockSettings;
    lockSettings = function(locked) {
      _origLockSettings(locked);
      document.querySelectorAll('.mob-panel input, .mob-panel select').forEach(el => { el.disabled = locked; });
    };

    // Init
    updateAspectBadge();
    requestAnimationFrame(() => requestAnimationFrame(() => resizePreview()));
  </script>
